name: Android CI

on:
  pull_request:
    paths:
      - ".github/workflows/android-ci.yml"
      - "CodexAndroid/**"
  push:
    branches:
      - main
      - android
    paths:
      - ".github/workflows/android-ci.yml"
      - "CodexAndroid/**"

jobs:
  android-build-unit:
    name: android-build-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x CodexAndroid/gradlew

      - name: Build debug app and run unit tests
        working-directory: CodexAndroid
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:assembleAndroidTest

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-unit-reports
          path: |
            CodexAndroid/app/build/reports/tests
            CodexAndroid/app/build/test-results
            CodexAndroid/app/build/reports/lint-results*
          if-no-files-found: ignore

  android-instrumentation-emulator:
    name: android-instrumentation-emulator
    runs-on: macos-latest
    needs: android-build-unit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x CodexAndroid/gradlew

      - name: Run connected instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            ADB_SERIAL="emulator-5554"
            adb start-server

            state_wait=0
            while [ "$state_wait" -lt 120 ]; do
              adb_state="$(adb -s "$ADB_SERIAL" get-state 2>/dev/null || true)"
              if [ "$adb_state" = "device" ]; then
                break
              fi
              if [ "$adb_state" = "offline" ]; then
                adb kill-server >/dev/null 2>&1 || true
                adb start-server >/dev/null 2>&1 || true
              fi
              state_wait=$((state_wait + 1))
              sleep 2
            done
            if [ "$adb_state" != "device" ]; then
              echo "ADB never reached device state for $ADB_SERIAL (last state: ${adb_state:-unknown})."
              adb devices -l || true
              exit 1
            fi

            boot_wait=0
            while [ "$boot_wait" -lt 180 ]; do
              boot_state="$(adb -s "$ADB_SERIAL" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
              if [ "$boot_state" = "1" ]; then
                break
              fi
              boot_wait=$((boot_wait + 1))
              sleep 2
            done
            if [ "$boot_state" != "1" ]; then
              echo "Emulator did not report sys.boot_completed=1 in time."
              adb devices -l || true
              adb -s "$ADB_SERIAL" shell getprop || true
              exit 1
            fi

            package_wait=0
            while [ "$package_wait" -lt 120 ]; do
              if adb -s "$ADB_SERIAL" shell cmd package path android >/dev/null 2>&1; then
                break
              fi
              package_wait=$((package_wait + 1))
              sleep 2
            done
            if ! adb -s "$ADB_SERIAL" shell cmd package path android >/dev/null 2>&1; then
              echo "Package manager service is not ready."
              adb devices -l || true
              adb -s "$ADB_SERIAL" shell getprop || true
              exit 1
            fi

            cd CodexAndroid
            ./gradlew :app:connectedDebugAndroidTest

      - name: Upload instrumentation reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: |
            CodexAndroid/app/build/reports/androidTests/connected
            CodexAndroid/app/build/outputs/androidTest-results
            CodexAndroid/app/build/outputs/connected_android_test_additional_output
          if-no-files-found: ignore
