name: Android CI

on:
  pull_request:
    paths:
      - ".github/workflows/android-ci.yml"
      - "CodexAndroid/**"
  push:
    branches:
      - main
      - android
    paths:
      - ".github/workflows/android-ci.yml"
      - "CodexAndroid/**"

jobs:
  android-build-unit:
    name: android-build-unit
    runs-on: ubuntu-latest
    env:
      BASE_VERSION: "0.1.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x CodexAndroid/gradlew

      - name: Build debug app and run unit tests
        working-directory: CodexAndroid
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:assembleAndroidTest

      - name: Build ABI split APKs (arm64-v8a, x86_64) with commit suffix
        working-directory: CodexAndroid
        run: |
          SHA6="${GITHUB_SHA::6}"
          ./gradlew :app:assembleDebug \
            -PenableAbiSplits=true \
            -PversionCommitSuffix="${SHA6}"

          VERSION_NAME="$(sed -n 's/.*"versionName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' app/build/outputs/apk/debug/output-metadata.json | head -n1)"
          if [[ -z "${VERSION_NAME}" ]]; then
            VERSION_NAME="${BASE_VERSION}+${SHA6}"
          fi
          echo "APK_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"

      - name: Upload arm64-v8a APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-arm64-v8a-${{ env.APK_VERSION_NAME }}
          path: CodexAndroid/app/build/outputs/apk/debug/*arm64-v8a*.apk
          if-no-files-found: error

      - name: Upload x86_64 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-x86_64-${{ env.APK_VERSION_NAME }}
          path: CodexAndroid/app/build/outputs/apk/debug/*x86_64*.apk
          if-no-files-found: error

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-unit-reports
          path: |
            CodexAndroid/app/build/reports/tests
            CodexAndroid/app/build/test-results
            CodexAndroid/app/build/reports/lint-results*
          if-no-files-found: ignore

  android-instrumentation-emulator:
    name: android-instrumentation-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: android-build-unit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x CodexAndroid/gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install SDK components and create AVD
        shell: bash
        run: |
          ABI="x86_64"
          SYSTEM_IMAGE="system-images;android-30;google_apis;${ABI}"
          AVD_ROOT="${RUNNER_TEMP}/.android"
          export ANDROID_EMULATOR_HOME="${AVD_ROOT}"
          export ANDROID_AVD_HOME="${AVD_ROOT}/avd"
          mkdir -p "${ANDROID_AVD_HOME}"

          echo "SYSTEM_IMAGE=${SYSTEM_IMAGE}" >> "${GITHUB_ENV}"
          echo "ANDROID_EMULATOR_HOME=${ANDROID_EMULATOR_HOME}" >> "${GITHUB_ENV}"
          echo "ANDROID_AVD_HOME=${ANDROID_AVD_HOME}" >> "${GITHUB_ENV}"

          set +o pipefail
          yes | sdkmanager --licenses > /dev/null 2>&1
          set -o pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-30" \
            "emulator" \
            "${SYSTEM_IMAGE}"

          echo "no" | avdmanager create avd --force --name ci-api30 --package "${SYSTEM_IMAGE}" --abi "${ABI}" --device "pixel_6"
          "${ANDROID_SDK_ROOT}/emulator/emulator" -list-avds
          if ! "${ANDROID_SDK_ROOT}/emulator/emulator" -list-avds | grep -Fxq "ci-api30"; then
            echo "Failed to create ci-api30 AVD."
            avdmanager list avd || true
            exit 1
          fi

      - name: Boot emulator and run instrumentation tests
        timeout-minutes: 20
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          EMU_SERIAL="emulator-5554"
          nohup "${SDK_ROOT}/emulator/emulator" \
            -avd ci-api30 \
            -port 5554 \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -gpu swiftshader_indirect \
            > /tmp/ci-emulator.log 2>&1 &
          EMU_PID=$!
          echo "EMU_PID=${EMU_PID}" >> "${GITHUB_ENV}"
          sleep 3
          if ! kill -0 "${EMU_PID}" >/dev/null 2>&1; then
            echo "Emulator process exited immediately."
            tail -n 200 /tmp/ci-emulator.log || true
            exit 1
          fi

          adb start-server

          wait_count=0
          max_wait=360
          adb_state=""
          boot_state=""
          while [[ "${wait_count}" -lt "${max_wait}" ]]; do
            adb_state="$(adb -s "${EMU_SERIAL}" get-state 2>/dev/null || true)"
            boot_state="$(adb -s "${EMU_SERIAL}" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            if [[ "${adb_state}" == "device" && "${boot_state}" == "1" ]]; then
              break
            fi
            if ! kill -0 "${EMU_PID}" >/dev/null 2>&1; then
              echo "Emulator process died while waiting for boot."
              tail -n 200 /tmp/ci-emulator.log || true
              exit 1
            fi
            if [[ "${adb_state}" == "offline" ]]; then
              adb reconnect offline >/dev/null 2>&1 || true
              adb kill-server >/dev/null 2>&1 || true
              adb start-server >/dev/null 2>&1 || true
            fi
            if (( wait_count % 15 == 0 )); then
              echo "Waiting for emulator boot... attempt=${wait_count}/${max_wait} state=${adb_state:-unknown} boot=${boot_state:-unknown}"
              adb devices -l || true
            fi
            wait_count=$((wait_count + 1))
            sleep 2
          done

          if [[ "${adb_state:-}" != "device" || "${boot_state:-}" != "1" ]]; then
            echo "Emulator failed readiness checks. serial=${EMU_SERIAL} adb_state=${adb_state:-unknown} boot=${boot_state:-unknown}"
            adb devices -l || true
            tail -n 200 /tmp/ci-emulator.log || true
            exit 1
          fi

          if ! adb -s "${EMU_SERIAL}" shell cmd package path android >/dev/null 2>&1; then
            echo "Package manager not ready after boot."
            adb devices -l || true
            adb -s "${EMU_SERIAL}" shell getprop || true
            tail -n 200 /tmp/ci-emulator.log || true
            exit 1
          fi

          cd CodexAndroid
          ./gradlew :app:connectedDebugAndroidTest

      - name: Shutdown emulator
        if: always()
        shell: bash
        run: |
          adb emu kill >/dev/null 2>&1 || true
          if [[ -n "${EMU_PID:-}" ]]; then
            kill "${EMU_PID}" >/dev/null 2>&1 || true
          fi

      - name: Upload instrumentation reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: |
            CodexAndroid/app/build/reports/androidTests/connected
            CodexAndroid/app/build/outputs/androidTest-results
            CodexAndroid/app/build/outputs/connected_android_test_additional_output
          if-no-files-found: ignore
